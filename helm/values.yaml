replicaCount: 2

image:
  repository: cr.yandex/zero-copy/enterprise-service
  pullPolicy: IfNotPresent
  tag: "v1.2.0"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: service.enterprise.local
      paths:
        - path: /
          pathType: ImplementationSpecific

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
    nvidia.com/gpu: 1
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
